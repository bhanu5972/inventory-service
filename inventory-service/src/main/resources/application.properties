# Application
spring.application.name=inventory-service
server.port=8082

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/inventory_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.pattern.console={"timestamp":"%d{ISO8601}","level":"%p","service":"inventory-service","traceId":"%X{traceId}","message":"%m"}%n
logging.level.com.example.inventory=DEBUG

# Reservation TTL (15 minutes in milliseconds)
inventory.reservation.ttl-ms=900000

# Scheduled cleanup interval (every 60 seconds)
inventory.cleanup.interval-ms=60000